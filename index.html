<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#13070a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Winess">
    <title>Winess Livraison</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script defer src="app.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="brand" type="button" data-action="home" aria-label="Retour accueil">
          <span class="brand-mark">W</span>
          <span>
            <strong>Winess Livraison</strong>
            <small>Gestion premium</small>
          </span>
        </button>
        <div class="sync-pill" id="syncStatus" aria-live="polite">
          <span class="sync-dot"></span>
          <span>Connexion...</span>
        </div>
      </header>

      <main id="app" class="screen" aria-live="polite"></main>
    </div>

    <div class="toast-stack" id="toastStack" aria-live="assertive"></div>

    <dialog class="modal" id="alertDialog">
      <form method="dialog" class="modal-card">
        <div class="modal-icon" id="alertIcon">!</div>
        <h2 id="alertTitle">Information</h2>
        <div id="alertMessage" class="modal-message"></div>
        <button class="btn btn-primary" value="ok">OK</button>
      </form>
    </dialog>

    <dialog class="modal" id="confirmDialog">
      <form method="dialog" class="modal-card">
        <div class="modal-icon danger">!</div>
        <h2 id="confirmTitle">Confirmation</h2>
        <p id="confirmMessage" class="modal-message"></p>
        <div class="modal-actions">
          <button class="btn btn-ghost" value="cancel">Annuler</button>
          <button class="btn btn-danger" value="confirm">Confirmer</button>
        </div>
      </form>
    </dialog>

    <dialog class="modal" id="profileDialog">
      <form class="modal-card" id="profileForm">
        <div class="modal-icon">W</div>
        <h2>Profil utilisateur</h2>
        <p class="modal-message">Romain est le profil par défaut. Le profil Admin demande un mot de passe.</p>
        <button class="btn btn-ghost" type="button" data-action="set-romain">Continuer avec Romain</button>
        <div class="field">
          <label for="adminPassword">Mot de passe Admin</label>
          <input id="adminPassword" name="adminPassword" type="password" inputmode="numeric" autocomplete="current-password">
        </div>
        <div class="modal-actions">
          <button class="btn btn-ghost" type="button" data-action="close-profile">Annuler</button>
          <button class="btn btn-primary" type="submit">Activer Admin</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
